name: Update Homebrew Cask

on:
  # Trigger after the release workflow completes (not on release:published,
  # which fires before assets finish uploading — causing SHA mismatch).
  workflow_run:
    workflows: ["Release c11mux macOS app"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.58.0 or v0.58.0)'
        required: true

permissions:
  contents: read

jobs:
  update-cask:
    runs-on: ubuntu-latest
    # Only run if the release workflow succeeded (or manual trigger)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # workflow_run: extract tag from the triggering workflow's head branch
            VERSION="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Could not determine version" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Invalid version: ${VERSION}" >&2
              exit 1
            fi
            echo "Skipping homebrew cask update for non-release ref: ${VERSION}"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Updating homebrew cask to version $VERSION"

      - name: Download DMG and get SHA256
        id: sha
        if: steps.version.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/Stage-11-Agentics/c11mux/releases/download/v${VERSION}/c11mux-macos.dmg"
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -sL -w '%{http_code}' "$URL" -o c11mux.dmg)
            FILE_SIZE=$(stat --printf="%s" c11mux.dmg 2>/dev/null || stat -f%z c11mux.dmg)
            if [ "$HTTP_CODE" = "200" ] && [ "$FILE_SIZE" -gt 1000000 ]; then
              echo "Download OK: HTTP $HTTP_CODE, size $FILE_SIZE bytes"
              break
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $HTTP_CODE, size ${FILE_SIZE:-0} bytes"
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "Failed to download DMG after $MAX_RETRIES attempts" >&2
              exit 1
            fi
            sleep 30
          done
          SHA256=$(shasum -a 256 c11mux.dmg | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "DMG SHA256: $SHA256"

      - name: Checkout homebrew-c11mux
        if: steps.version.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: Stage-11-Agentics/homebrew-c11mux
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-c11mux

      - name: Update cask formula
        if: steps.version.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          cat > homebrew-c11mux/Casks/c11mux.rb << CASKEOF
          cask "c11mux" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/Stage-11-Agentics/c11mux/releases/download/v#{version}/c11mux-macos.dmg"
            name "c11mux"
            desc "Stage 11's fork of cmux — native macOS terminal multiplexer for AI coding agents"
            homepage "https://github.com/Stage-11-Agentics/c11mux"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :sonoma"

            conflicts_with cask: "cmux"

            app "c11mux.app"
            binary "#{appdir}/c11mux.app/Contents/Resources/bin/cmux"

            zap trash: [
              "~/Library/Application Support/c11mux",
              "~/Library/Application Support/cmux",
              "~/Library/Caches/c11mux",
              "~/Library/Caches/cmux",
              "~/Library/Preferences/com.stage11.c11mux.plist",
              "~/Library/Preferences/ai.manaflow.cmuxterm.plist",
            ]
          end
          CASKEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' homebrew-c11mux/Casks/c11mux.rb

      - name: Verify cask SHA matches DMG
        if: steps.version.outputs.skip != 'true'
        run: |
          CASK_SHA=$(grep 'sha256' homebrew-c11mux/Casks/c11mux.rb | sed 's/.*"\(.*\)".*/\1/')
          ACTUAL_SHA=$(shasum -a 256 c11mux.dmg | cut -d' ' -f1)
          if [ "$CASK_SHA" != "$ACTUAL_SHA" ]; then
            echo "SHA mismatch! Cask: $CASK_SHA, Actual: $ACTUAL_SHA" >&2
            exit 1
          fi
          echo "SHA verification passed: $CASK_SHA"

      - name: Commit and push
        if: steps.version.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd homebrew-c11mux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/c11mux.rb
          if git diff --staged --quiet; then
            echo "No changes - cask already up to date"
          else
            git commit -m "Update c11mux to ${VERSION}"
            git push
          fi
