# c11mux default Ghostty palette.
#
# Layered only when the user's Ghostty config does not set background /
# foreground / palette. User's own Ghostty config always wins. See
# docs/c11mux-module-5-brand-identity-spec.md "Default terminal palette".

background = #000000
foreground = #e8e8e8
cursor-color = #c9a84c
cursor-text = #000000
selection-background = #c9a84c33
selection-foreground = #e8e8e8

# 16 ANSI colors — void-dominant with gold taking the yellow slot.
# Chromatic slots are desaturated (~50%) so code highlighting still reads
# as "gold on void," not a neon terminal splash.
palette = 0=#000000
palette = 1=#8b3a3a
palette = 2=#6b8a4c
palette = 3=#c9a84c
palette = 4=#3a5a8b
palette = 5=#7a4a8b
palette = 6=#4a8a8b
palette = 7=#c8c8c8
palette = 8=#333333
palette = 9=#b04a4a
palette = 10=#8baa5a
palette = 11=#e0c060
palette = 12=#4a7aaa
palette = 13=#9a5aaa
palette = 14=#5aaaaa
palette = 15=#e8e8e8
